<div class="login-container">
  <div class="login-card">
    <h2>Acesso Restrito</h2>
    <form (ngSubmit)="fazerLogin()">
      <div class="logo-container" style="text-align: center; margin-bottom: 20px;">
       <!-- O routerLink redireciona para a rota /reserva -->
        <a routerLink="/reserva" href="/reserva" style="text-decoration: none; cursor: pointer;">
         <!-- Se você tiver uma imagem de logo, use a tag img: -->
           <!-- <img src="/assets/logo_feita.png" alt="Feita de Bronze" style="max-width: 400px;"> -->

           <!-- Caso contrário, use o título estilizzato: -->
         <h1 style="color: #d4af37; font-family: sans-serif;">Feita de Bronze</h1>
       </a>
      </div>  
      <div class="form-group">
        <label for="usuario">Usuário</label>
        <input type="text" id="usuario" name="usuario" 
               [(ngModel)]="credenciais.usuario" required 
               placeholder="Digite seu usuário">
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" 
               [(ngModel)]="credenciais.senha" required 
               placeholder="Digite sua senha">
      </div>

      <button type="submit" [disabled]="!credenciais.usuario || !credenciais.senha">Entrar</button>
    </form>
  </div>
</div>
